<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="shortcut icon" href="#" />
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="../public/css/index.css">
    <title>Tamisemi Education Dashboard</title>
 <style>
    *{
        margin: 0;
        padding: 0;
    }
        /* Ensure body and html take full height of the viewport */
        body, html {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Make the header full width and center content */
        header {
            position: fixed;
            text-align: center;
            padding: 20px;
            background-color: #0984e3;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
        }

        /* Full page container to center content */
        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Full page report container */
        #report-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Error container is also centered */
        .error-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }
    </style>

</head>

<body>
    <header class="embed-container col-lg-12 col-md-12 col-sm-12 shadow">
        <p>
            TAMISEMI EDUCATION DATA
        </p>
    </header>

    <main>
        <!-- Full-page report container -->
        <section id="report-container" style="width: 100%; height: 90vh;" class=" col-lg-12 col-md-12 col-sm-12 mt-5" >
            <!-- Power BI report content will go here -->
        </section>

        <!-- Used to display report embed error messages -->
        <section class="error-container m-5">
            <!-- Error message content will go here -->
        </section>
    </main>

    <script src="/js/jquery.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/powerbi.min.js"></script>
    <script src="../public/js/index.js"></script>

</body>

</html>
